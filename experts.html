<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>La forge des experts</title>

<link rel="stylesheet" href="style.css">

<style>

body {
  background-color: #9B7D63;
  font-family: Arial, sans-serif;
}

.container {
  max-width: 1000px;
  margin: auto;
}

/* ===== Textareas ===== */

textarea {
  width: 100%;
  font-family: monospace;
  margin-bottom: 10px;
}

#input {
  height: 200px;
}

#solution {
  height: 200px;
}

#gridInput {
  height: 400px;   /* ~10 lignes visibles */
  resize: vertical;
}

#movesOutput {
  height: 40px;
  white-space: nowrap;
  overflow-x: auto;
}

/* Image */
#img-left {
  max-width: 200px;
  display: block;
  margin-bottom: 15px;
}

button {
  padding: 6px 12px;
  cursor: pointer;
}

hr {
  margin: 40px 0;
}

</style>
</head>

<body>

<div class="container">

<h2>La forge des experts</h2>

<!-- ===================== -->
<!-- SECTION OPTIMISER -->
<!-- ===================== -->

<h3>Optimiser une grille</h3>

<div class="container">
<img src="horse_queen.jpg" id="img-left" alt="queen">

<select id="mode">
  <option value="diffRC">+ (lignes/colonnes)</option>
  <option value="diffDiag">+x (lignes/colonnes/diagonales)</option>
  <option value="balance">⚖️ Balance</option>
</select>

<br><br>

<textarea id="input"></textarea>
<textarea id="solution"></textarea>

<br>

<button id="runBtn" onclick="start()">Lancer</button>

<div id="status"></div>
<div id="score">Score: -</div>

<hr>
</div>
<!-- ===================== -->
<!-- SECTION CONVERTIR -->
<!-- ===================== -->

<h3>Convertir grille → déplacements</h3>

<textarea id="gridInput"
placeholder="Collez ici la grille..."></textarea>

<button onclick="convertGrid()">Convertir</button>

<br><br>

<textarea id="movesOutput"
placeholder="Résultat..."></textarea>

</div>

<script>

/* ===== Worker optimisation ===== */

let worker;

function start() {

  if (worker) worker.terminate();

  let solution = document.getElementById("input").value;

  worker = new Worker("worker_dynamic.js");

  worker.onmessage = (e) => {

    const data = e.data;

    if (data.type === "init_ok") {
      document.getElementById("status").textContent = "✅ Valide";
      return;
    }

    if (data.type === "init_error") {
      document.getElementById("status").textContent =
        "❌ " + data.message;
      return;
    }

    document.getElementById("solution").textContent =
      data.solution;

    document.getElementById("score").textContent =
      `Score: ${data.score} | + ${data.diffRC} | +x ${data.diffDiag} | ⚖️ ${data.balance}`;
  };

  const mode = document.getElementById("mode").value;
  worker.postMessage({ solution, mode });
}


/* ===== Conversion ===== */

function convertGrid() {

  const input = document.getElementById("gridInput").value;

  if (!input.trim()) {
    alert("Veuillez coller une grille.");
    return;
  }

  const moves = [
    [3,0],[2,2],[0,3],[-2,2],
    [-3,0],[-2,-2],[0,-3],[2,-2]
  ];

  let cleaned = input
    .replace(/\n/g," ")
    .replace(/\s+/g," ")
    .trim();

  let values = cleaned.split(" ");
  let size = values.length;
  let n = Math.sqrt(size);

  if (!Number.isInteger(n)) {
    document.getElementById("movesOutput").value =
      "❌ Grille non carrée.";
    return;
  }

  let grid = [];
  for (let i=0;i<n;i++) {
    grid[i] = values.slice(i*n,(i+1)*n);
  }

  let positions = {};
  let startPosition = null;

  for (let i=0;i<n;i++) {
    for (let j=0;j<n;j++) {
      let k = parseInt(grid[i][j]);
      positions[k] = [i,j];
      if (k===1) startPosition = `${i},${j}`;
    }
  }

  if (!startPosition) {
    document.getElementById("movesOutput").value =
      "❌ Position 1 introuvable.";
    return;
  }

  let sequence = "";
  let errors = [];

  for (let k=1;k<n*n;k++) {

    let [r1,c1] = positions[k];
    let [r2,c2] = positions[k+1] || positions[1];

    let dr = r2-r1;
    let dc = c2-c1;

    let idx = moves.findIndex(
      m=>m[0]===dr && m[1]===dc
    );

    if (idx===-1)
      errors.push(`Erreur entre ${k} et ${k+1}`);
    else
      sequence += idx;
  }

  if (errors.length>0) {
    document.getElementById("movesOutput").value =
      "⚠️ Erreurs:\n"+errors.join("\n");
  } else {
    document.getElementById("movesOutput").value =
      `python p1.py ${n} ${startPosition} ${sequence}`;
  }
}

</script>

</body>
</html>

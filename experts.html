<textarea id="input"></textarea>

<br><br>
<button id="runBtn" onclick="start()">Lancer</button>

<div id="status"></div>
<div id="score">Score: -</div>

<script>
let worker;

function start() {
    if (worker) worker.terminate();

    const btn = document.getElementById("runBtn");
    btn.classList.remove("valid");

    let solution = document.getElementById("input").value;

    worker = new Worker("worker_dynamic.js");

    worker.onmessage = (e) => {
        const data = e.data;
    
        if (data.type === "init_ok") {
            document.getElementById("status").textContent = "✅ Valide";
            document.getElementById("runBtn").classList.add("valid");
            return;
        }
    
        if (data.type === "init_error") {
            document.getElementById("status").textContent = "❌ " + data.message;
            return;
        }
    
        // 🔥 affichage live
        document.getElementById("input").value = data.solution;
        document.getElementById("score").textContent =
            "Score: " + data.score;
    };
    worker.postMessage({ solution });
}
</script>

<style>
#runBtn.valid {
    background-color: green;
    color: white;
}
</style>

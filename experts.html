<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>La forge des experts</title>

<link rel="stylesheet" href="style.css">

<style>

body {
  background-color: #9B7D63;
  font-family: Papyrus;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* =========================
   SECTION OPTIMISER
========================= */

.optimiser {
  display: flex;
  gap: 40px;
  align-items: flex-start;
  margin-top: 20px;
}

.optimiser-image img {
  height: 650px;
  width: auto;
  object-fit: contain;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.optimiser-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.optimiser-panel textarea {
  width: 100%;
  font-family: monospace;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

#input { height: 200px; }
#solution { height: 200px; }

#runBtn {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

#runBtn:hover { background: #555; }
#runBtn.valid { background-color: #4CAF50; }

/* =========================
   SECTION CONVERTIR
========================= */

#gridInput {
  width: 100%;
  height: 400px;
  font-family: monospace;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  resize: vertical;
}

#movesOutput {
  width: 100%;
  height: 40px;
  font-family: monospace;
  white-space: nowrap;
  overflow-x: auto;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 120px;
  height: 40px;
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

hr {
  margin: 50px 0;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 900px) {
  .optimiser {
    flex-direction: column;
  }

  .optimiser-image img {
    width: 100%;
    height: auto;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>La forge des experts</h1>

<!-- ===================== -->
<!-- OPTIMISER -->
<!-- ===================== -->

<h2>Optimiser une grille</h2>

<div class="optimiser">

  <div class="optimiser-image">
    <img src="horse_queen.jpg" alt="queen">
  </div>

  <div class="optimiser-panel">

    <select id="mode">
      <option value="diffRC">+ (lignes/colonnes)</option>
      <option value="diffDiag">+x (lignes/colonnes/diagonales)</option>
      <option value="balance">⚖️ Balance</option>
    </select>

    <textarea id="input" placeholder="Entrée..."></textarea>
    <textarea id="solution" placeholder="Solution..."></textarea>

    <button id="runBtn" onclick="start()">Lancer</button>

    <div id="status"></div>
    <div id="score">Score: -</div>

  </div>

</div>

<hr>

<!-- ===================== -->
<!-- CONVERTIR -->
<!-- ===================== -->

<h2>Convertir grille → déplacements</h2>

<textarea id="gridInput"
placeholder="Collez ici la grille...
 73  29  32  74   9  33  77  10  34
  4  43  81   3  42  80   2  41  79
 31  75   8  30  76  25  35  61  18
 72  28  67  23   1  40  78  11  39
  5  44  70  26  49  62  19  48  51
 55  22   7  54  68  24  36  60  17
 71  27  66  63  13  58  50  12  38
  6  45  69  21  46  53  20  47  52
 56  64  14  57  65  15  37  59  16"></textarea>

<br><br>

<button onclick="convertGrid()">Convertir</button>

<br><br>

<textarea id="movesOutput"
placeholder="Résultat..."></textarea>

</div>

<script>

/* ===========================
   WORKER OPTIMISATION
=========================== */

let worker;

function start() {

  if (worker) worker.terminate();

  let solution = document.getElementById("input").value;

  worker = new Worker("worker_dynamic.js");

  worker.onmessage = (e) => {

    const data = e.data;

    if (data.type === "init_ok") {
      document.getElementById("status").textContent = "✅ Valide";
      document.getElementById("runBtn").classList.add("valid");
      return;
    }

    if (data.type === "init_error") {
      document.getElementById("status").textContent =
        "❌ " + data.message;
      return;
    }

    document.getElementById("solution").textContent =
      data.solution;

    document.getElementById("score").textContent =
      `Score: ${data.score} | + ${data.diffRC} | +x ${data.diffDiag} | ⚖️ ${data.balance}`;
  };

  const mode = document.getElementById("mode").value;
  worker.postMessage({ solution, mode });
}


/* ===========================
   CONVERSION
=========================== */

function convertGrid() {

  const input = document.getElementById("gridInput").value;

  if (!input.trim()) {
    alert("Veuillez coller une grille.");
    return;
  }

  const moves = [
    [3,0],[2,2],[0,3],[-2,2],
    [-3,0],[-2,-2],[0,-3],[2,-2]
  ];

  let cleaned = input
    .replace(/\n/g," ")
    .replace(/\s+/g," ")
    .trim();

  let values = cleaned.split(" ");
  let size = values.length;
  let n = Math.sqrt(size);

  if (!Number.isInteger(n)) {
    document.getElementById("movesOutput").value =
      "❌ Grille non carrée.";
    return;
  }

  let grid = [];
  for (let i=0;i<n;i++) {
    grid[i] = values.slice(i*n,(i+1)*n);
  }

  let positions = {};
  let startPosition = null;

  for (let i=0;i<n;i++) {
    for (let j=0;j<n;j++) {
      let k = parseInt(grid[i][j]);
      positions[k] = [i,j];
      if (k===1) startPosition = `${i},${j}`;
    }
  }

  if (!startPosition) {
    document.getElementById("movesOutput").value =
      "❌ Position 1 introuvable.";
    return;
  }

  let sequence = "";

  for (let k=1;k<n*n;k++) {

    let [r1,c1] = positions[k];
    let [r2,c2] = positions[k+1] || positions[1];

    let dr = r2-r1;
    let dc = c2-c1;

    let idx = moves.findIndex(
      m=>m[0]===dr && m[1]===dc
    );

    if (idx!==-1)
      sequence += idx;
  }

  document.getElementById("movesOutput").value =
    `python p1.py ${n} ${startPosition} ${sequence}`;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>0² limit : les experts</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* Zone grille conversion */
    #gridInput {
      width: 100%;
      height: 400px;          /* ~10 lignes visibles */
      font-family: monospace;
      resize: vertical;
    }

    /* Sortie sur une ligne pleine largeur */
    #movesOutput {
      width: 100%;
      height: 40px;
      font-family: monospace;
      white-space: nowrap;
      overflow-x: auto;
    }

    /* Cache contenu onglets par défaut */
    .tab-content {
      display: none;
      padding: 10px 0;
    }

    /* Affichage via radio */
    #tab1:checked ~ #content1,
    #tab2:checked ~ #content2 {
      display: block;
    }

    /* Style onglets */
    .tabs {
      display: flex;
      border-bottom: 2px solid #444;
      margin-bottom: 15px;
    }

    .tabs input {
      display: none;
    }

    .tabs label {
      padding: 10px 18px;
      cursor: pointer;
      background: #ddd;
      margin-right: 4px;
    }

    .tabs input:checked + label {
      background: white;
      font-weight: bold;
      border: 2px solid #444;
      border-bottom: none;
    }
  </style>
</head>

<body style="background-color: #9B7D63;">

<h2>La forge des experts</h2>

<div class="tabs">

  <!-- Onglets -->
  <input type="radio" name="tab" id="tab1" checked>
  <label for="tab1">Optimiser</label>

  <input type="radio" name="tab" id="tab2">
  <label for="tab2">Convertir grille → déplacements</label>

  <!-- ===================== -->
  <!-- ONGLET 1 -->
  <!-- ===================== -->
  <div id="content1" class="tab-content">

    <h3>Optimiser une grille</h3>

    <select id="mode">
      <option value="diffRC">+ (lignes/colonnes)</option>
      <option value="diffDiag">+x (diagonales)</option>
      <option value="balance">⚖️ Balance</option>
    </select>

    <br><br>

    <div class="container">
      <textarea id="input"></textarea>
      <textarea id="solution"></textarea>
    </div>

    <br>

    <button id="runBtn" onclick="start()">Lancer</button>

    <div id="status"></div>
    <div id="score">Score: -</div>

  </div>

  <!-- ===================== -->
  <!-- ONGLET 2 -->
  <!-- ===================== -->
  <div id="content2" class="tab-content">

    <h3>Convertir grille → déplacements</h3>

    <textarea id="gridInput"
      placeholder=" 73  29  32  74   9  33  77  10  34
  4  43  81   3  42  80   2  41  79
 31  75   8  30  76  25  35  61  18
 72  28  67  23   1  40  78  11  39
  5  44  70  26  49  62  19  48  51
 55  22   7  54  68  24  36  60  17
 71  27  66  63  13  58  50  12  38
  6  45  69  21  46  53  20  47  52
 56  64  14  57  65  15  37  59  16">
    </textarea>

    <br><br>

    <button onclick="convertGrid()">Convertir</button>

    <br><br>

    <textarea id="movesOutput"
      placeholder="Résultat..."></textarea>

  </div>

</div>

<script>

// =====================
// WORKER OPTIMISATION
// =====================

let worker;

function start() {

    if (worker) worker.terminate();

    const btn = document.getElementById("runBtn");
    btn.classList.remove("valid");

    let solution = document.getElementById("input").value;

    worker = new Worker("worker_dynamic.js");

    worker.onmessage = (e) => {

        const data = e.data;

        if (data.type === "init_ok") {
            document.getElementById("status").textContent = "✅ Valide";
            document.getElementById("runBtn").classList.add("valid");
            return;
        }

        if (data.type === "init_error") {
            document.getElementById("status").textContent = "❌ " + data.message;
            return;
        }

        document.getElementById("solution").textContent = data.solution;
        document.getElementById("score").textContent =
            `Score: ${data.score} | + ${data.diffRC} | +x ${data.diffDiag} | ⚖️ ${data.balance}`;
    };

    const mode = document.getElementById("mode").value;
    worker.postMessage({ solution, mode });
}

// =====================
// CONVERSION GRILLE → DÉPLACEMENTS
// =====================

function convertGrid() {

    const input = document.getElementById("gridInput").value;

    if (!input.trim()) {
        alert("Veuillez coller une grille.");
        return;
    }

    const moves = [
        [3,0],[2,2],[0,3],[-2,2],
        [-3,0],[-2,-2],[0,-3],[2,-2]
    ];

    let cleaned = input
        .replace(/\n/g," ")
        .replace(/\s+/g," ")
        .trim();

    let values = cleaned.split(" ");
    let size = values.length;
    let n = Math.sqrt(size);

    if (!Number.isInteger(n)) {
        document.getElementById("movesOutput").value =
            "❌ Grille non carrée.";
        return;
    }

    let grid = [];
    for (let i=0;i<n;i++) {
        grid[i] = values.slice(i*n,(i+1)*n);
    }

    let positions = {};
    let startPosition = null;

    for (let i=0;i<n;i++) {
        for (let j=0;j<n;j++) {
            let k = parseInt(grid[i][j]);
            positions[k] = [i,j];
            if (k===1) startPosition = `${i},${j}`;
        }
    }

    if (!startPosition) {
        document.getElementById("movesOutput").value =
            "❌ Position 1 introuvable.";
        return;
    }

    let sequence = "";
    let errors = [];

    for (let k=1;k<n*n;k++) {

        let [r1,c1] = positions[k];
        let [r2,c2] = positions[k+1] || positions[1];

        let dr = r2-r1;
        let dc = c2-c1;

        let idx = moves.findIndex(m=>m[0]===dr && m[1]===dc);

        if (idx===-1)
            errors.push(`Erreur entre ${k} et ${k+1}`);
        else
            sequence += idx;
    }

    if (errors.length>0) {
        document.getElementById("movesOutput").value =
            "⚠️ Erreurs détectées:\n"+errors.join("\n");
    } else {
        document.getElementById("movesOutput").value =
            `python p1.py ${n} ${startPosition} ${sequence}`;
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>La forge des experts</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .tabs {
      margin-bottom: 10px;
    }

    .tab {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      background: #ddd;
      margin-right: 5px;
    }

    .tab.active {
      background: white;
      font-weight: bold;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>

<body style="background-color: gray;">


<div class="tabs">

  <input type="radio" name="tab" id="tab1" checked>
  <label for="tab1">Optimiser</label>

  <input type="radio" name="tab" id="tab2">
  <label for="tab2">Convertir grille → déplacements</label>

</div>

<!-- ===================== -->
<!-- ONGLET 1 : OPTIMISER -->
<!-- ===================== -->
<div id="optimiser" class="tab-content active">

  <h3>Pour optimiser une grille</h3>

  <br><br>

  <select id="mode">
    <option value="diffRC">+ (lignes/colonnes)</option>
    <option value="diffDiag">+x (diagonales)</option>
    <option value="balance">⚖️ Balance</option>
  </select>

  <br>

  <div class="container">
    <img src="horse_queen.jpg" id="img-left" class="side-img">
    <br><br>
    <textarea id="input"></textarea>
    <textarea id="solution"></textarea>
  </div>

  <button id="runBtn" onclick="start()">Lancer</button>

  <div id="status"></div>
  <div id="score">Score: -</div>

</div>

<!-- ===================== -->
<!-- ONGLET 2 : CONVERTIR -->
<!-- ===================== -->
<div id="convertir" class="tab-content">

  <h3>Convertir grille → déplacements</h3>

  <p>Collez ici une grille pour générer les déplacements.</p>

  <textarea id="gridInput" placeholder="Collez la grille ici..."></textarea>
  <br>
  <button onclick="convertGrid()">Convertir</button>
  <br><br>
  <textarea id="movesOutput" placeholder="Résultat..."></textarea>

</div>

<script>

// =====================
// ONGLET
// =====================
function showTab(tabName) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));

  document.getElementById(tabName).classList.add('active');
  event.target.classList.add('active');
}

// =====================
// TON SCRIPT EXISTANT
// =====================
let worker;

function start() {
    if (worker) worker.terminate();

    const btn = document.getElementById("runBtn");
    btn.classList.remove("valid");

    let solution = document.getElementById("input").value;

    worker = new Worker("worker_dynamic.js");

    worker.onmessage = (e) => {
        const data = e.data;

        if (data.type === "init_ok") {
            document.getElementById("status").textContent = "✅ Valide";
            document.getElementById("runBtn").classList.add("valid");
            return;
        }

        if (data.type === "init_error") {
            document.getElementById("status").textContent = "❌ " + data.message;
            return;
        }

        document.getElementById("solution").textContent = data.solution;
        document.getElementById("score").textContent =
        `Score: ${data.score}  |  +  ${data.diffRC}  |  +x  ${data.diffDiag}  |  ⚖️  ${data.balance}`;
    };

    const mode = document.getElementById("mode").value;
    worker.postMessage({ solution, mode });
}

// =====================
// CONVERSION (à compléter)
// =====================
function convertGrid() {
    const input = document.getElementById("gridInput").value;

    if (!input.trim()) {
        alert("Veuillez coller une grille.");
        return;
    }

    // Déplacements autorisés (comme Python)
    const moves = [
        [3, 0],   // 0
        [2, 2],   // 1
        [0, 3],   // 2
        [-2, 2],  // 3
        [-3, 0],  // 4
        [-2, -2], // 5
        [0, -3],  // 6
        [2, -2]   // 7
    ];

    // Nettoyage du texte (équivalent Python)
    let cleaned = input
        .replace(/\n/g, " ")
        .replace(/\s+/g, " ")
        .trim();

    let values = cleaned.split(" ");

    // Vérifier si carré parfait
    const size = values.length;
    const n = Math.sqrt(size);

    if (!Number.isInteger(n)) {
        document.getElementById("movesOutput").value =
            "❌ Le nombre de cases n'est pas un carré parfait.";
        return;
    }

    // Construire positions
    let grid = [];
    for (let i = 0; i < n; i++) {
        grid[i] = values.slice(i * n, (i + 1) * n);
    }

    let positions = {};
    let startPosition = null;

    for (let i = 0; i < n; i++) {
        for (let j = 0; j < n; j++) {
            let k = parseInt(grid[i][j]);
            positions[k] = [i, j];

            if (k === 1) {
                startPosition = `${i},${j}`;
            }
        }
    }

    if (!startPosition) {
        document.getElementById("movesOutput").value =
            "❌ Impossible de trouver la position de départ (1).";
        return;
    }

    let sequence = "";
    let errors = [];

    for (let k = 1; k < n * n; k++) {
        let [r1, c1] = positions[k];
        let [r2, c2] = positions[k + 1] || positions[1];
        let dr = r2 - r1;
        let dc = c2 - c1;
        let idx = moves.findIndex(m => m[0] === dr && m[1] === dc);

        if (idx === -1) {
            errors.push(`Mouvement non valide entre ${k} et ${k + 1}: (${dr},${dc})`);
        } else {
            sequence += idx;
        }
    }

    let result = "";
    if (errors.length > 0) {
        result += "⚠️ Erreurs détectées :\n";
        errors.forEach(e => result += e + "\n");
    } else {
        result += "python p1.py " + n + " " + startPosition + " " + sequence + "\n";
        result += "\n✅ Aucune erreur, parcours cohérent.";
    }
    document.getElementById("movesOutput").value = result;
}

</script>

</body>
</html>

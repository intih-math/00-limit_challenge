<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>0² limit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color": black;>

<h1>🧠 🧠 🧠 🧠 🧠</h1>
<h2>Vous découvrez le jeu remplissez manuellement la grille ci-dessous,</h2> 
<h2>cliquez sur une case et laissez vous guider ! Le rouge ne porte pas bonheur.</h2>

<div class="container">

<img src="challenge.png" id="img-left" class="side-img">  

<img src="notice.png" id="img-left" class="side-img">  

<div id="game"></div>

<img src="chimere-chess-piece.png" id="img-right" class="side-img">  
</div>
  
<div id="results">
  <p>+ : <span id="scorePlus"></span></p>
  <p>+x : <span id="scorePlusX"></span></p>
  <p>Balance : <span id="scoreBalance"></span></p>
</div>
  
<div id="controls">
  <button onclick="toggleHelp()" id="helpBtn">Aide: OFF</button>

  <input type="text" id="name" placeholder="Pseudo">
  <input type="text" id="grille" placeholder="Parcours">
  <button onclick="submit()">Envoyer score</button>
</div>

  
<h2>🏆 Classement</h2>
<ul id="leaderboard"></ul>

<script type="module" src="firebase.js"></script>
<script src="game.js"></script>

</body>
</html>
